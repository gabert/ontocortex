    fk_table: drg_treasure_items
    fk_column: drg_acquisition_id
    ref_table: drg_acquisitions
    ref_column: drg_acquisition_id
  conductedBy:
    iri: https://dragonhoard.example.org/ontology#conductedBy
    type: direct
    fk_table: drg_incursions
    fk_column: drg_hero_id
    ref_table: drg_heros
    ref_column: drg_hero_id
  contains:
    iri: https://dragonhoard.example.org/ontology#contains
    type: direct
    fk_table: drg_hoards
    fk_column: drg_treasure_item_id
    ref_table: drg_treasure_items
    ref_column: drg_treasure_item_id
  hasCurse:
    iri: https://dragonhoard.example.org/ontology#hasCurse
    type: direct
    fk_table: drg_treasure_items
    fk_column: drg_curse_id
    ref_table: drg_curses
    ref_column: drg_curse_id
  occupies:
    iri: https://dragonhoard.example.org/ontology#occupies
    type: direct
    fk_table: drg_dragons
    fk_column: drg_lair_id
    ref_table: drg_lairs
    ref_column: drg_lair_id
  owns:
