relations:
  forSchool:
    iri: https://studentloans.example.org/ontology#forSchool
    type: direct
    fk_table: sl_loans
    fk_column: sl_school_id
    ref_table: sl_schools
    ref_column: sl_school_id
  hasBorrower:
    iri: https://studentloans.example.org/ontology#hasBorrower
    type: direct
    fk_table: sl_loans
    fk_column: sl_student_id
    ref_table: sl_students
    ref_column: sl_student_id
  hasCosigner:
    iri: https://studentloans.example.org/ontology#hasCosigner
    type: junction
    junction_table: sl_loan_cosigners
    steps:
    - fk_table: sl_loan_cosigners
      fk_column: sl_loan_id
      ref_table: sl_loans
      ref_column: sl_loan_id
    - fk_table: sl_loan_cosigners
      fk_column: sl_cosigner_id
      ref_table: sl_cosigners
      ref_column: sl_cosigner_id
  hasLoanType:
    iri: https://studentloans.example.org/ontology#hasLoanType
    type: direct
    fk_table: sl_loans
    fk_column: sl_loan_type_id
    ref_table: sl_loan_types
    ref_column: sl_loan_type_id
  hasPayment:
    iri: https://studentloans.example.org/ontology#hasPayment
    type: direct
    fk_table: sl_payments
    fk_column: sl_loan_id
    ref_table: sl_loans
    ref_column: sl_loan_id
  issuedBy:
    iri: https://studentloans.example.org/ontology#issuedBy
    type: direct
    fk_table: sl_loans
    fk_column: sl_lender_id
    ref_table: sl_lenders
    ref_column: sl_lender_id

