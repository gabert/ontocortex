# ===============================================================================
# Student Loans Business Rules
# Covers: interest accrual . payment allocation . grace periods . cosigner rules
#         . autopay discount . hardship options . default timeline
# ===============================================================================


# -------------------------------------------------------------------------------
# BASE INTEREST RATES (per loan-type product, annual)
#
# Rates are stored on the LoanType record (base_interest_rate). These are the
# defaults the agent should use when creating new loans. The actual loan may
# carry a different rate if originated under a promotional program.
# -------------------------------------------------------------------------------

base_interest_rates:
  federal_subsidized:    0.0553   # 5.53% — undergraduate, need-based
  federal_unsubsidized:  0.0553   # 5.53% — undergraduate, no need requirement
  federal_plus:          0.0808   # 8.08% — parent PLUS / grad PLUS
  private:               0.0995   # 9.95% — private market, varies by credit
  refinanced:            0.0699   # 6.99% — refinanced through a private lender


# -------------------------------------------------------------------------------
# AUTOPAY DISCOUNT
# -------------------------------------------------------------------------------

autopay_discount:
  rate_reduction: 0.0025    # 0.25 percentage points off the interest rate
  applies_to: All loan types
  notes: >
    Enrolling in autopay reduces the interest rate by 0.25 percentage points
    for as long as autopay remains active. If the borrower cancels autopay,
    the rate reverts to the base rate immediately.


# -------------------------------------------------------------------------------
# PAYMENT ALLOCATION
#
# When a payment is received, apply it in this order:
#   1. Accrued interest (interest_portion)
#   2. Remaining amount to principal (principal_portion)
#
# interest_portion + principal_portion must always equal amount.
# -------------------------------------------------------------------------------

payment_allocation:
  order:
    - accrued_interest
    - principal
  rule: >
    Interest is charged daily at (interest_rate / 365) * current_balance.
    When a payment arrives, pay down all accrued interest first; whatever
    remains reduces the principal balance.


# -------------------------------------------------------------------------------
# GRACE PERIOD
#
# After graduation or dropping below half-time enrollment, federal loans
# enter a grace period before repayment begins.
# -------------------------------------------------------------------------------

grace_period:
  federal_subsidized:    6    # months
  federal_unsubsidized:  6
  federal_plus:          0    # no grace — repayment begins at disbursement
  private:               0    # varies; most have no grace
  refinanced:            0
  notes: >
    During the grace period, loan status is 'in_grace'. Federal subsidized
    loans do not accrue interest during grace. All other types accrue
    interest normally. Once grace ends, status transitions to 'in_repayment'.


# -------------------------------------------------------------------------------
# COSIGNER REQUIREMENTS
# -------------------------------------------------------------------------------

cosigner_rules:
  required_for:
    - private
  recommended_for:
    - refinanced
  release_eligibility:
    consecutive_on_time_payments: 24
    notes: >
      After 24 consecutive on-time payments, the borrower may apply to
      release the cosigner from the loan. Release requires the borrower
      to meet credit and income criteria on their own.


# -------------------------------------------------------------------------------
# HARDSHIP OPTIONS
# -------------------------------------------------------------------------------

hardship:
  deferment:
    max_months: 36
    eligibility: Federal loans only. Unemployment or economic hardship.
    interest_accrual: Only unsubsidized federal loans accrue interest during deferment.
  forbearance:
    max_months: 12
    eligibility: All loan types. Discretionary hardship (medical, short-term).
    interest_accrual: All loans accrue interest during forbearance.
  notes: >
    Deferment and forbearance pause required payments. Interest accrual
    differs as noted. Use deferment first if the borrower is eligible —
    it is cheaper.


# -------------------------------------------------------------------------------
# DEFAULT TIMELINE
# -------------------------------------------------------------------------------

default_rules:
  delinquency_days: 90    # first missed payment after 90 days marks the loan delinquent
  default_days: 270       # 270 days of non-payment transitions status to 'defaulted'
  notes: >
    A loan is delinquent after 90 days of missed payments and in default
    after 270 days. Defaulted federal loans may be subject to wage
    garnishment and tax-refund offset. Defaulted private loans go to
    collections and damage the borrower's credit severely.


# -------------------------------------------------------------------------------
# PREPAYMENT
# -------------------------------------------------------------------------------

prepayment:
  penalty: 0.00
  notes: >
    All loan types in this product set allow prepayment without penalty.
    Extra payments apply to principal after covering accrued interest.
